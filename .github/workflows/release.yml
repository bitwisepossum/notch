name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          GOOS=linux  GOARCH=amd64 go build -ldflags="-s -w" -o notch-linux-amd64 .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o notch-windows-amd64.exe .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            notch-linux-amd64
            notch-windows-amd64.exe
